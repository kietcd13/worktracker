<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WorkTracker Dashboard</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const { useState, useMemo, useEffect } = React;

    // =========================================================================
    // 1. BẠN DÁN FIREBASE CONFIG CỦA BẠN VÀO ĐÂY
    // =========================================================================
    const firebaseConfig = {
      apiKey: "AIzaSyDyl2FoFZwKtFL6yb2sPEEWzJvBBzNK01A",
      authDomain: "taskhub-c3f41.firebaseapp.com",
      projectId: "taskhub-c3f41",
      storageBucket: "taskhub-c3f41.firebasestorage.app",
      messagingSenderId: "874827473111",
      appId: "1:874827473111:web:cdbd7c6b8d5ece0d285092"
    };

    let app, auth, db;
    try {
      // Nếu không có config, tự hiểu là không dùng DB
      if(Object.keys(firebaseConfig).length > 0) {
          app = initializeApp(firebaseConfig);
          auth = getAuth(app);
          db = getFirestore(app);
      }
    } catch (e) {
      console.error("Firebase config error:", e);
    }

    // --- ICONS COMPONENTS (Inline SVGs) ---
    const FolderGit2 = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 20H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h3.9a2 2 0 0 1 1.69.9l.81 1.2a2 2 0 0 0 1.67.9H20a2 2 0 0 1 2 2v2"/><path d="M12 10v4h4"/><path d="m12 14 1.5-1.5"/><path d="M22 13v1"/><path d="M22 17v3a2 2 0 0 1-2 2h-9"/></svg>;
    const LogOut = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>;
    const Plus = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
    const X = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
    const UserPlus = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>;
    const FileText = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>;
    const Trash2 = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>;
    const Users = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
    const ArrowUpDown = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="7" y1="15" x2="7" y2="3"/><polyline points="3 11 7 15 11 11"/><line x1="17" y1="9" x2="17" y2="21"/><polyline points="13 13 17 9 21 13"/></svg>;
    const ChevronUp = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="18 15 12 9 6 15"/></svg>;
    const ChevronDown = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>;
    const ListTodo = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="5" width="6" height="6" rx="1"/><path d="m3 17 2 2 4-4"/><path d="M13 6h8"/><path d="M13 12h8"/><path d="M13 18h8"/></svg>;
    const FilePlus = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>;
    const Download = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>;

    // --- CONSTANTS & MOCK DATA ---
    const PHASES = ['Pre-Design', 'DFM - Wall Panels', 'DFM - Floor Cassette', 'DFM - Roof Panels', 'DFM - Lookouts'];
    const OPTIONAL_PHASES = ['Update Pre - Design', 'Update DFM - Wall Panels', 'Update DFM - Floor Cassette', 'Update DFM - Roof Panels', 'Update DFM - Lookouts'];
    const PROGRESS_STATUSES = ['Not Started', 'In Progress', 'Checking', 'On Hold', 'Completed'];
    const BUILDING_TYPES = ['Bungalow', '2-Storey', '2.5-Storey'];
    const STATUSES = ['Low Priority', 'Medium Priority', 'High Priority', 'On Hold', 'Checking', 'Awaiting Further Info', 'Completed'];

    const STATUS_STYLES = {
      'Low Priority': 'text-emerald-600 bg-white border-slate-200',
      'Medium Priority': 'text-orange-600 bg-white border-slate-200',
      'High Priority': 'text-red-600 bg-white border-slate-200',
      'On Hold': 'bg-red-600 text-white border-red-700',
      'Checking': 'bg-orange-400 text-black border-orange-500',
      'Awaiting Further Info': 'bg-yellow-300 text-black border-yellow-400',
      'Completed': 'bg-emerald-500 text-white border-emerald-600'
    };

    const OWNER_COLORS = [
      'text-rose-600', 'text-violet-600', 'text-emerald-600', 
      'text-amber-600', 'text-cyan-600', 'text-fuchsia-600',
      'text-blue-600', 'text-orange-600'
    ];

    const generateInitialPhases = () => {
      const phases = {};
      PHASES.forEach(p => { phases[p] = { progress: 'Not Started', hoursSpent: 0, dateSent: '' }; });
      return phases;
    };

    // Dữ liệu mẫu ban đầu nếu chưa có Firebase
    const INITIAL_USERS = [
      { id: 'm1', name: 'Kiet Vu', role: 'Manager' },
      { id: 'm2', name: 'Huy Tang', role: 'Manager' },
      { id: 's1', name: 'John Doe', role: 'Staff' },
    ];

    const INITIAL_PROJECTS = [
      { 
        id: 'p1', 
        jobName: 'Alpha Tower',
        ref: 'REF-001',
        receivedDate: '2026-04-10',
        startedDate: '2026-04-12',
        ownerId: 's1', 
        dueDate: '2026-05-20',
        buildingType: '2-Storey',
        status: 'High Priority',
        phases: generateInitialPhases()
      }
    ];

    // --- MAIN APP COMPONENT ---
    function App() {
      const [firebaseUser, setFirebaseUser] = useState(null);
      const [isDataLoaded, setIsDataLoaded] = useState(false);
      
      const [users, setUsers] = useState(INITIAL_USERS);
      const [projects, setProjects] = useState([]);
      
      const [currentUser, setCurrentUser] = useState(null);
      const [selectedUserId, setSelectedUserId] = useState('');
      const [newStaffName, setNewStaffName] = useState('');

      const [selectedJob, setSelectedJob] = useState(null);
      const [showManageStaffModal, setShowManageStaffModal] = useState(false);

      // 1. Khởi tạo Auth
      useEffect(() => {
        if (!auth) {
            setIsDataLoaded(true); // Không có firebase -> Cho vô dùng local luôn
            return;
        }
        
        signInAnonymously(auth).catch(err => console.error("Auth error", err));
        const unsubscribe = onAuthStateChanged(auth, setFirebaseUser);
        return () => unsubscribe();
      }, []);

      // 2. Fetch Data
      useEffect(() => {
        if (!auth || !firebaseUser || !db) return;

        let isSeeding = false;

        // Lưu ý: Đổi đường dẫn lưu trữ để không phụ thuộc vào `appId` môi trường ảo
        // Thay vào đó, lưu thẳng vào collection root là 'users' và 'projects'
        const usersRef = collection(db, 'users');
        const unsubUsers = onSnapshot(usersRef, (snapshot) => {
          const loadedUsers = [];
          snapshot.forEach(doc => loadedUsers.push(doc.data()));

          if (snapshot.empty && !isSeeding) {
            isSeeding = true;
            // Tạo sẵn data manager nếu database trắng
            INITIAL_USERS.forEach(u => setDoc(doc(db, 'users', u.id), u));
          } else {
            setUsers(loadedUsers);
          }
        });

        const projectsRef = collection(db, 'projects');
        const unsubProjects = onSnapshot(projectsRef, (snapshot) => {
          const loadedProjects = [];
          snapshot.forEach(doc => loadedProjects.push(doc.data()));
          setProjects(loadedProjects);
          setIsDataLoaded(true);
        });

        return () => { unsubUsers(); unsubProjects(); };
      }, [firebaseUser]);

      // --- FIREBASE CRUD HANDLERS ---
      const handleCreateStaff = async (e) => {
        e.preventDefault();
        if (!newStaffName.trim()) return;
        const newUser = { id: `s${Date.now()}`, name: newStaffName, role: 'Staff' };
        
        if (db) {
            await setDoc(doc(db, 'users', newUser.id), newUser);
        } else {
            setUsers([...users, newUser]); // Chạy local
        }
        setNewStaffName('');
      };

      const handleUpdateRole = async (userId, newRole) => {
        if (db) {
            const existing = users.find(u => u.id === userId);
            await setDoc(doc(db, 'users', userId), { ...existing, role: newRole });
        } else {
            setUsers(users.map(u => u.id === userId ? { ...u, role: newRole } : u));
        }
        if (currentUser && currentUser.id === userId) {
            setCurrentUser(prev => ({ ...prev, role: newRole }));
        }
      };

      const handleRemoveStaff = async (userId) => {
        if (db) {
            await deleteDoc(doc(db, 'users', userId));
        } else {
            setUsers(users.filter(u => u.id !== userId)); // Chạy local
        }
        if (currentUser && currentUser.id === userId) {
          setCurrentUser(null);
          setSelectedUserId('');
          setShowManageStaffModal(false);
        }
      };

      const handleSaveJobDetails = async (jobId, updatedData) => {
        if (db) {
            const existing = projects.find(p => p.id === jobId);
            await setDoc(doc(db, 'projects', jobId), { ...existing, ...updatedData });
        } else {
            setProjects(projects.map(p => p.id === jobId ? { ...p, ...updatedData } : p)); // Chạy local
        }
        setSelectedJob(null);
      };

      const handleDeleteJob = async (jobId) => {
        if (db) {
            await deleteDoc(doc(db, 'projects', jobId));
        } else {
            setProjects(projects.filter(p => p.id !== jobId)); // Chạy local
        }
        setSelectedJob(null);
      };

      const handleLogin = () => {
        const user = users.find(u => u.id === selectedUserId);
        if (user) setCurrentUser(user);
      };

      if (!isDataLoaded) {
        return (
            <div className="min-h-screen bg-gradient-to-br from-indigo-50 to-cyan-50 flex flex-col items-center justify-center p-4">
                <div className="w-12 h-12 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin mb-4"></div>
                <h2 className="text-xl font-bold text-slate-700">Connecting to Cloud Storage...</h2>
                <p className="text-sm text-slate-500 mt-2">Checking Database Config...</p>
            </div>
        );
      }

      if (!currentUser) {
        return (
          <div className="min-h-screen bg-gradient-to-br from-indigo-50 via-purple-50 to-cyan-50 flex items-center justify-center p-4">
            <div className="bg-white/80 backdrop-blur-xl p-8 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.12)] max-w-md w-full border border-white">
              <div className="text-center mb-6">
                <div className="bg-gradient-to-tr from-indigo-600 to-cyan-500 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg transform rotate-3 hover:rotate-6 transition-transform">
                  <FolderGit2 className="text-white w-8 h-8" />
                </div>
                <h1 className="text-3xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-indigo-700 to-cyan-600">
                  WorkTracker
                </h1>
                <p className="text-gray-500 mt-2">Log in to your workspace</p>
                {!db && <p className="text-xs text-red-500 mt-1 font-bold">⚠️ No Firebase Config - Local mode only (Data will be lost on refresh)</p>}
              </div>
              
              <div className="space-y-4 mb-8">
                <div>
                  <label className="block text-sm font-semibold text-gray-700 mb-1">Select User</label>
                  <select 
                    value={selectedUserId}
                    onChange={(e) => setSelectedUserId(e.target.value)}
                    className="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none bg-white/50"
                  >
                    <option value="">-- Choose your account --</option>
                    <optgroup label="Manager">
                      {users.filter(u => u.role === 'Manager').map(u => (
                        <option key={u.id} value={u.id}>{u.name}</option>
                      ))}
                    </optgroup>
                    <optgroup label="Staff">
                      {users.filter(u => u.role === 'Staff').map(u => (
                        <option key={u.id} value={u.id}>{u.name}</option>
                      ))}
                    </optgroup>
                  </select>
                </div>
                <button 
                  onClick={handleLogin}
                  disabled={!selectedUserId}
                  className="w-full bg-gradient-to-r from-indigo-600 to-cyan-500 text-white py-3 rounded-xl hover:from-indigo-700 hover:to-cyan-600 disabled:from-gray-300 disabled:to-gray-400 disabled:cursor-not-allowed transition-all font-bold shadow-md hover:shadow-lg"
                >
                  Login
                </button>
              </div>

              <div className="border-t border-gray-200 pt-6">
                <div className="flex items-center gap-2 mb-4 text-indigo-700">
                  <UserPlus className="w-5 h-5" />
                  <h2 className="font-bold">Create New Staff</h2>
                </div>
                <form onSubmit={handleCreateStaff} className="flex gap-2">
                  <input 
                    type="text" 
                    placeholder="Staff name..." 
                    value={newStaffName}
                    onChange={(e) => setNewStaffName(e.target.value)}
                    className="flex-1 px-4 py-2 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 outline-none bg-white/50"
                  />
                  <button type="submit" className="bg-gradient-to-r from-emerald-500 to-teal-500 text-white px-5 py-2 rounded-xl hover:from-emerald-600 hover:to-teal-600 transition-colors text-sm font-bold shadow-sm">
                    Add
                  </button>
                </form>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-slate-50 flex flex-col font-sans">
          <header className="bg-gradient-to-r from-indigo-700 via-purple-600 to-cyan-600 shadow-md px-6 py-4 flex justify-between items-center text-white">
            <div className="flex items-center gap-3">
              <div className="bg-white/20 p-2 rounded-xl backdrop-blur-sm border border-white/10">
                <FolderGit2 className="text-white w-6 h-6" />
              </div>
              <h1 className="text-2xl font-extrabold tracking-tight">WorkTracker</h1>
            </div>
            <div className="flex items-center gap-4">
              <div className="text-sm bg-black/20 px-4 py-1.5 rounded-full flex items-center gap-2 backdrop-blur-sm border border-white/10">
                <span className="text-indigo-100">User:</span>
                <span className="font-bold">{currentUser.name}</span>
                <span className={`text-[10px] uppercase tracking-wider px-2 py-0.5 rounded-full font-bold ${currentUser.role === 'Manager' ? 'bg-fuchsia-500 text-white' : 'bg-emerald-400 text-emerald-950'}`}>
                  {currentUser.role}
                </span>
              </div>
              <div className="flex gap-2">
                <button 
                  onClick={() => setShowManageStaffModal(true)}
                  className="flex items-center gap-2 text-white hover:bg-white/20 px-3 py-2 rounded-xl transition-colors text-sm font-semibold border border-transparent hover:border-white/20"
                >
                  <Users className="w-4 h-4" />
                  Manage Staff
                </button>
                <button 
                  onClick={() => {setCurrentUser(null); setSelectedUserId('');}}
                  className="flex items-center gap-2 bg-rose-500 hover:bg-rose-600 text-white px-4 py-2 rounded-xl transition-colors text-sm font-semibold shadow-sm"
                >
                  <LogOut className="w-4 h-4" />
                  Logout
                </button>
              </div>
            </div>
          </header>

          <main className="flex-1 max-w-7xl w-full mx-auto p-6">
            {currentUser.role === 'Manager' ? (
              <ManagerDashboard 
                users={users} 
                projects={projects}
                setProjects={setProjects}
                db={db}
                onJobClick={setSelectedJob}
              />
            ) : (
              <StaffDashboard 
                currentUser={currentUser} users={users}
                projects={projects} 
                onJobClick={setSelectedJob}
              />
            )}
          </main>

          {selectedJob && (
            <JobProgressModal 
              job={selectedJob} 
              currentUser={currentUser}
              users={users}
              onClose={() => setSelectedJob(null)} 
              onSave={handleSaveJobDetails}
              onDelete={handleDeleteJob}
            />
          )}

          {showManageStaffModal && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
              <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden flex flex-col max-h-[80vh] border border-gray-100">
                <div className="px-6 py-5 border-b flex justify-between items-center bg-gradient-to-r from-slate-50 to-white">
                  <h2 className="text-xl font-extrabold text-slate-800 flex items-center gap-2">
                    <Users className="w-6 h-6 text-indigo-600" />
                    Manage Staff
                  </h2>
                  <button onClick={() => setShowManageStaffModal(false)} className="p-2 hover:bg-rose-50 text-slate-400 hover:text-rose-500 rounded-full transition-colors">
                    <X className="w-5 h-5" />
                  </button>
                </div>
                
                <div className="p-6 overflow-y-auto bg-slate-50/50">
                  <form onSubmit={handleCreateStaff} className="mb-8 bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                    <label className="block text-sm font-bold text-slate-700 mb-2">Create New User</label>
                    <div className="flex gap-2">
                      <input 
                        type="text" 
                        placeholder="Enter full name..." 
                        value={newStaffName}
                        onChange={(e) => setNewStaffName(e.target.value)}
                        className="flex-1 px-4 py-2.5 border rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none bg-slate-50 focus:bg-white transition-colors"
                        required
                      />
                      <button type="submit" className="px-5 py-2.5 bg-gradient-to-r from-indigo-600 to-cyan-500 text-white rounded-lg hover:from-indigo-700 hover:to-cyan-600 font-bold text-sm shadow-sm transition-all">
                        Add
                      </button>
                    </div>
                  </form>

                  <div>
                    <label className="block text-sm font-bold text-slate-700 mb-3">Existing Users</label>
                    <div className="space-y-2">
                      {users.length === 0 ? (
                        <div className="text-center py-8 bg-white rounded-xl border border-dashed border-gray-300">
                          <p className="text-sm text-slate-500">No users found.</p>
                        </div>
                      ) : (
                        users.map((user, idx) => {
                          const userColor = OWNER_COLORS[idx % OWNER_COLORS.length];
                          return (
                            <div key={user.id} className="flex justify-between items-center bg-white p-3 rounded-xl border border-gray-100 shadow-sm hover:border-indigo-100 transition-colors">
                              <div className="flex items-center gap-3">
                                <div className={`w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm bg-slate-50 ${userColor}`}>
                                  {user.name.charAt(0).toUpperCase()}
                                </div>
                                <span className={`text-sm font-bold ${userColor}`}>{user.name}</span>
                              </div>
                              <div className="flex items-center gap-2">
                                <select
                                  value={user.role}
                                  onChange={(e) => handleUpdateRole(user.id, e.target.value)}

                                >

        jobName: '', ref: '', receivedDate: '', startedDate: '', ownerId: '', dueDate: '', buildingType: '', status: 'Medium Priority' 
      });

      const handleCreateJob = async (e) => {
        e.preventDefault();
        if (!newJob.jobName.trim()) return;
        
        const project = {
          id: `p${Date.now()}`,
          ...newJob,
          phases: generateInitialPhases()
        };
        
        if (db) {
            await setDoc(doc(db, 'projects', project.id), project);
        } else {
            setProjects([...projects, project]); // Chạy local
        }

        setNewJob({ jobName: '', ref: '', receivedDate: '', startedDate: '', ownerId: '', dueDate: '', buildingType: '', status: 'Medium Priority' });
        setActiveTab('list');
      };

      const handleExport = () => {
        const allPhasesSet = new Set(PHASES);
        projects.forEach(p => {
          Object.keys(p.phases).forEach(phase => allPhasesSet.add(phase));
        });
        const allPhases = Array.from(allPhasesSet);

        const excelData = projects.map(p => {
          const owner = users.find(u => u.id === p.ownerId)?.name || 'Unassigned';

          const preDesignHrs = parseFloat(p.phases['Pre-Design']?.hoursSpent || 0);
          const totalDfmHrs = ['DFM - Wall Panels', 'DFM - Floor Cassette', 'DFM - Roof Panels', 'DFM - Lookouts']
            .reduce((sum, phase) => sum + parseFloat(p.phases[phase]?.hoursSpent || 0), 0);
          const updatesHrs = Object.keys(p.phases)
            .filter(phase => !PHASES.includes(phase))
            .reduce((sum, phase) => sum + parseFloat(p.phases[phase]?.hoursSpent || 0), 0);

          const row = {
            'Job Name': p.jobName,
            'Status': p.status || '',
            'Ref': p.ref || '',
            'Received Date': p.receivedDate || '',
            'Started Date': p.startedDate || '',
            'Owner': owner,
            'Due Date': p.dueDate || '',
            'Building Type': p.buildingType || '',
            'Pre-Design Hrs': preDesignHrs,
            'Total DFM Hrs': totalDfmHrs,
            'Updates Hrs': updatesHrs,
            'Total Hrs': preDesignHrs + totalDfmHrs + updatesHrs
          };

          allPhases.forEach(phase => {
            const phaseData = p.phases[phase];
            row[`${phase} - Progress`] = phaseData ? phaseData.progress : '';
            row[`${phase} - Hrs`] = phaseData ? phaseData.hoursSpent : '';
            row[`${phase} - Date Sent`] = phaseData ? phaseData.dateSent : '';
          });

          return row;

        const worksheet = XLSX.utils.json_to_sheet(excelData);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "Report");
        XLSX.writeFile(workbook, "WorkTracker_Report.xlsx");

                onClick={() => setActiveTab('list')}

              >

              <button 
                onClick={() => setActiveTab('add')}
                className={`px-6 py-5 flex items-center gap-2 font-bold transition-all border-b-2 ${activeTab === 'add' ? 'border-indigo-600 text-indigo-700 bg-white' : 'border-transparent text-slate-500 hover:bg-slate-100'}`}
              >
                <FilePlus className="w-5 h-5" />
                Add New Job

            <div className="flex items-center gap-4">
              <div className="text-sm font-bold text-slate-400">Total Jobs: {projects.length}</div>
              <button

                className="flex items-center gap-2 bg-emerald-100 text-emerald-700 hover:bg-emerald-200 px-4 py-2 rounded-xl transition-colors text-sm font-bold shadow-sm"
              >
                <Download className="w-4 h-4" />
                Export Report

            </div>
          </div>
          
          <div className="p-6 bg-slate-50/30 min-h-[500px]">
            {activeTab === 'add' && (
              <form onSubmit={handleCreateJob} className="bg-white p-8 rounded-2xl shadow-sm border border-slate-200 max-w-4xl mx-auto">
                <h3 className="text-lg font-extrabold text-slate-800 mb-6 flex items-center gap-2 border-b pb-4">
                  <Plus className="w-5 h-5 text-indigo-500" />

                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                  <div className="flex flex-col gap-1 lg:col-span-2">
                    <label className="text-xs font-bold text-slate-500 uppercase tracking-wider">Job Name *</label>

                  </div>
                  
                  <div className="flex flex-col gap-1">
                    <label className="text-xs font-bold text-slate-500 uppercase tracking-wider">Ref</label>
                    <input type="text" value={newJob.ref} onChange={e => setNewJob({...newJob, ref: e.target.value})} className="px-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 outline-none bg-slate-50 focus:bg-white transition-colors" />

                  </div>

                  <div className="flex flex-col gap-1">

                    <select value={newJob.ownerId} onChange={e => setNewJob({...newJob, ownerId: e.target.value})} className="px-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 outline-none bg-slate-50 focus:bg-white transition-colors">
                      <option value="">Select Owner...</option>
                      {staffUsers.map(u => <option key={u.id} value={u.id}>{u.name}</option>)}
                    </select>
                  </div>

                  <div className="flex flex-col gap-1">
                    <label className="text-xs font-bold text-slate-500 uppercase tracking-wider">Building Type *</label>
                    <select required value={newJob.buildingType} onChange={e => setNewJob({...newJob, buildingType: e.target.value})} className="px-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 outline-none bg-slate-50 focus:bg-white transition-colors">
                      <option value="">Select Type...</option>
                      {BUILDING_TYPES.map(type => <option key={type} value={type}>{type}</option>)}

                  </div>

                  <div className="flex flex-col gap-1">

                      {STATUSES.map(st => <option key={st} value={st}>{st}</option>)}
                    </select>
                  </div>
                  
                  <div className="lg:col-span-3 flex justify-end mt-4 pt-4 border-t border-slate-100">
                    <button type="button" onClick={() => setActiveTab('list')} className="px-6 py-3 text-slate-600 font-bold hover:bg-slate-100 rounded-xl transition-colors mr-3 text-sm">

                    </button>
                    <button type="submit" className="bg-gradient-to-r from-indigo-600 to-cyan-500 text-white px-8 py-3 rounded-xl hover:from-indigo-700 hover:to-cyan-600 shadow-md transition-all flex items-center gap-2 text-sm font-bold">

              <FileText className="w-6 h-6 text-indigo-600" />

    function JobsTable({ projects, users, onJobClick }) {
      const [sortConfig, setSortConfig] = useState({ key: null, direction: 'asc' });

      const sortedProjects = useMemo(() => {
        let sortableItems = [...projects];
        if (sortConfig.key !== null) {
          sortableItems.sort((a, b) => {
            let aValue = a[sortConfig.key];
            let bValue = b[sortConfig.key];

            if (sortConfig.key === 'ownerId') {
              aValue = users.find(u => u.id === aValue)?.name || '';
              bValue = users.find(u => u.id === bValue)?.name || '';
            }

            if (sortConfig.key === 'status') {
              const statusWeights = { 'High Priority': 7, 'Medium Priority': 6, 'Low Priority': 5, 'Checking': 4, 'Awaiting Further Info': 3, 'On Hold': 2, 'Completed': 1 };
              aValue = statusWeights[aValue] || 0;
              bValue = statusWeights[bValue] || 0;
            }

            aValue = aValue || '';
            bValue = bValue || '';

            if (aValue < bValue) return sortConfig.direction === 'asc' ? -1 : 1;
            if (aValue > bValue) return sortConfig.direction === 'asc' ? 1 : -1;
            return 0;
          });
        }
        return sortableItems;
      }, [projects, sortConfig, users]);

      const requestSort = (key) => {
        let direction = 'asc';
        if (sortConfig.key === key && sortConfig.direction === 'asc') {
          direction = 'desc';
        }
        setSortConfig({ key, direction });
      };

      const getSortIcon = (columnName) => {
        if (sortConfig.key !== columnName) {
          return <ArrowUpDown className="w-3 h-3 text-slate-300 group-hover:text-slate-400" />;
        }
        return sortConfig.direction === 'asc' 
          ? <ChevronUp className="w-3 h-3 text-indigo-600" /> 
          : <ChevronDown className="w-3 h-3 text-indigo-600" />;
      };

      const staffUsers = users.filter(u => u.role === 'Staff');
      const getUserColor = (userId) => {
        if (!userId) return 'text-slate-400';
        const idx = staffUsers.findIndex(u => u.id === userId);
        return OWNER_COLORS[Math.max(0, idx) % OWNER_COLORS.length];
      };

      return (
        <div className="overflow-x-auto rounded-xl border border-slate-200 bg-white shadow-sm">
          <table className="w-full text-sm text-left whitespace-nowrap">
            <thead className="text-[11px] text-slate-500 uppercase tracking-wider bg-slate-50/80 border-b border-slate-200 font-bold">
              <tr>
                {[
                  { label: 'Job Name', key: 'jobName' },
                  { label: 'Status', key: 'status' },
                  { label: 'Ref', key: 'ref' },
                  { label: 'Received Date', key: 'receivedDate' },
                  { label: 'Started Date', key: 'startedDate' },
                  { label: 'Owner', key: 'ownerId' },
                  { label: 'Due Date', key: 'dueDate' },
                  { label: 'Building Type', key: 'buildingType' },
                ].map(col => (
                  <th 
                    key={col.key}
                    onClick={() => requestSort(col.key)}
                    className="px-5 py-4 cursor-pointer hover:bg-slate-100 transition-colors group"
                  >
                    <div className="flex items-center gap-1.5">
                      {col.label}
                      {getSortIcon(col.key)}
                    </div>
                  </th>
                ))}
              </tr>
            </thead>
            <tbody className="divide-y divide-slate-100">
              {sortedProjects.length === 0 ? (
                <tr>
                  <td colSpan="8" className="px-5 py-12 text-center text-slate-400 bg-white">
                    <div className="flex flex-col items-center justify-center">
                      <FileText className="w-10 h-10 text-slate-200 mb-2" />
                      <p>No jobs found.</p>
                    </div>
                  </td>
                </tr>
              ) : sortedProjects.map(p => {
                const owner = users.find(u => u.id === p.ownerId)?.name || 'Unassigned';
                const ownerColorClass = getUserColor(p.ownerId);
                const statusClass = STATUS_STYLES[p.status] || STATUS_STYLES['Low Priority'];

                return (
                  <tr 
                    key={p.id} 
                    onClick={() => onJobClick(p)}
                    className="hover:bg-indigo-50/50 cursor-pointer transition-colors bg-white group"
                    title="Click to view/edit phases"
                  >
                    <td className="px-5 py-3.5 font-bold text-indigo-700 group-hover:text-indigo-800">{p.jobName}</td>
                    <td className="px-5 py-3.5">
                      {p.status ? (
                        <span className={`px-2.5 py-1 rounded-md text-[10px] uppercase tracking-wider font-bold border ${statusClass}`}>
                          {p.status}
                        </span>
                      ) : (
                        <span className="text-slate-400 text-xs font-semibold">-</span>
                      )}
                    </td>
                    <td className="px-5 py-3.5 text-slate-600 font-mono text-xs">{p.ref || '-'}</td>
                    <td className="px-5 py-3.5 text-slate-600">{p.receivedDate || '-'}</td>
                    <td className="px-5 py-3.5 text-slate-600">{p.startedDate || '-'}</td>
                    <td className={`px-5 py-3.5 font-extrabold ${ownerColorClass}`}>
                      <span className="bg-slate-50 px-2.5 py-1 rounded-md border border-slate-100 shadow-sm">{owner}</span>
                    </td>
                    <td className="px-5 py-3.5 text-slate-600 font-medium">{p.dueDate || '-'}</td>
                    <td className="px-5 py-3.5">
                      {p.buildingType ? (
                        <span className="px-2.5 py-1 rounded-md text-xs font-semibold bg-slate-100 text-slate-700 border border-slate-200">
                          {p.buildingType}
                        </span>
                      ) : '-'}
                    </td>
                  </tr>
                )
              })}
            </tbody>
          </table>
        </div>
      );
    }

    function JobProgressModal({ job, currentUser, users, onClose, onSave, onDelete }) {
      const [phasesForm, setPhasesForm] = useState({ ...job.phases });
      const [jobInfoForm, setJobInfoForm] = useState({
        status: job.status || 'Medium Priority',
        ref: job.ref || '',
        ownerId: job.ownerId || '',
        startedDate: job.startedDate || ''
      });
      const [selectedOptPhase, setSelectedOptPhase] = useState(OPTIONAL_PHASES[0]);
      const [errorMsg, setErrorMsg] = useState('');
      const [showDeleteConfirm, setShowDeleteConfirm] = useState(false);
      
      const isEditable = currentUser.role === 'Manager' || job.ownerId === currentUser.id;

      useEffect(() => {
        const phases = Object.values(phasesForm);
        if (phases.length === 0) return;
        
        const allCompleted = phases.every(p => p.progress === 'Completed');
        if (allCompleted && jobInfoForm.status !== 'Completed') {
          setJobInfoForm(prev => ({ ...prev, status: 'Completed' }));
        } else if (!allCompleted && jobInfoForm.status === 'Completed') {
          setJobInfoForm(prev => ({ ...prev, status: '' }));
        }
      }, [phasesForm]);

      const getProgressStyles = (progress, hasError) => {
        if (hasError) return 'bg-red-50 border-red-400 text-red-900 ring-2 ring-red-400';
        switch (progress) {
          case 'Not Started': return 'bg-gray-200 text-black border-gray-300';
          case 'In Progress': return 'bg-blue-300 text-black border-blue-400';
          case 'Checking': return 'bg-orange-400 text-black border-orange-500';
          case 'On Hold': return 'bg-red-600 text-white border-red-700';
          case 'Completed': return 'bg-emerald-600 text-white border-emerald-700';
          default: return 'bg-white border-slate-200 text-slate-700';
        }
      };

      const handlePhaseChange = (phaseName, field, value) => {
        setPhasesForm(prev => ({
          ...prev,
          [phaseName]: {
            ...prev[phaseName],
            [field]: value
          }
        }));
        if (errorMsg) setErrorMsg('');
      };

      const handleInfoChange = (field, value) => {
        setJobInfoForm(prev => ({ ...prev, [field]: value }));
      };

      const handleAddPhase = () => {
        let finalName = selectedOptPhase;
        let count = 1;
        while(phasesForm[finalName]) {
            count++;
            finalName = `${selectedOptPhase} (${count})`;
        }
        setPhasesForm(prev => ({
            ...prev,
            [finalName]: { progress: 'Not Started', hoursSpent: 0, dateSent: '' }
        }));
      };

      const handleRemovePhase = (phaseName) => {
        const newPhases = { ...phasesForm };
        delete newPhases[phaseName];
        setPhasesForm(newPhases);
      };

      const handleSave = () => {
        for (const [phaseName, data] of Object.entries(phasesForm)) {
          if (data.progress === 'Completed' && !data.dateSent) {
            setErrorMsg(`Vui lòng nhập Date Sent cho phase "${phaseName}" khi đã chọn Completed.`);
            return;
          }
        }
        setErrorMsg('');
        onSave(job.id, { phases: phasesForm, ...jobInfoForm });
      };
      
      const statusClass = STATUS_STYLES[jobInfoForm.status] || STATUS_STYLES['Low Priority'];
      const staffUsers = users.filter(u => u.role === 'Staff');

      const preDesignHrs = parseFloat(phasesForm['Pre-Design']?.hoursSpent || 0);
      const totalDfmHrs = ['DFM - Wall Panels', 'DFM - Floor Cassette', 'DFM - Roof Panels', 'DFM - Lookouts']
        .reduce((sum, phase) => sum + parseFloat(phasesForm[phase]?.hoursSpent || 0), 0);
      const updatesHrs = Object.keys(phasesForm)
        .filter(phase => !PHASES.includes(phase))
        .reduce((sum, phase) => sum + parseFloat(phasesForm[phase]?.hoursSpent || 0), 0);

      // Cố định thứ tự hiển thị của các Phase
      const orderedPhaseNames = useMemo(() => {
        const keys = Object.keys(phasesForm);
        const basePhases = PHASES.filter(p => keys.includes(p));
        const optionalPhases = keys.filter(p => !PHASES.includes(p));
        return [...basePhases, ...optionalPhases];
      }, [phasesForm]);

      return (
        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
          <div className="bg-white rounded-2xl shadow-[0_20px_50px_rgba(8,_112,_184,_0.15)] w-full max-w-4xl overflow-hidden flex flex-col max-h-[90vh] border border-white relative">
            
            {showDeleteConfirm && (
              <div className="absolute inset-0 bg-white/90 backdrop-blur-sm z-50 flex items-center justify-center">
                <div className="bg-white p-6 rounded-2xl shadow-xl border border-red-100 text-center max-w-sm">
                  <div className="w-12 h-12 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4">
                    <Trash2 className="w-6 h-6" />
                  </div>
                  <h3 className="text-lg font-bold text-slate-800 mb-2">Delete this job?</h3>
                  <p className="text-sm text-slate-500 mb-6">This action cannot be undone. All progress and logged hours will be lost.</p>
                  <div className="flex gap-3 justify-center">
                    <button onClick={() => setShowDeleteConfirm(false)} className="px-4 py-2 border border-slate-200 rounded-xl hover:bg-slate-50 font-bold text-sm transition-colors text-slate-700">Cancel</button>
                    <button onClick={() => onDelete(job.id)} className="px-4 py-2 bg-red-600 text-white rounded-xl hover:bg-red-700 font-bold text-sm shadow-md transition-all">Yes, Delete</button>
                  </div>
                </div>
              </div>
            )}

            <div className="px-6 py-5 border-b flex justify-between items-start bg-gradient-to-r from-indigo-50 to-white">
              <div className="flex-1 pr-4">
                <div className="flex items-center gap-3">
                  <h2 className="text-2xl font-extrabold text-indigo-900">{job.jobName}</h2>
                  {isEditable ? (
                    <select 
                      value={jobInfoForm.status}
                      onChange={e => handleInfoChange('status', e.target.value)}
                      className={`px-2.5 py-1 rounded-md text-[10px] uppercase tracking-wider font-bold border outline-none cursor-pointer ${jobInfoForm.status ? statusClass : 'bg-slate-100 text-slate-500 border-slate-200'}`}
                    >
                      <option value="" className="bg-white text-slate-800">No Status</option>
                      {STATUSES.map(st => (
                        <option key={st} value={st} className="bg-white text-slate-800">
                          {st}
                        </option>
                      ))}
                    </select>
                  ) : (
                    jobInfoForm.status ? (
                      <span className={`px-2.5 py-1 rounded-md text-[10px] uppercase tracking-wider font-bold border ${statusClass}`}>
                        {jobInfoForm.status}
                      </span>
                    ) : (
                      <span className="px-2.5 py-1 rounded-md text-[10px] uppercase tracking-wider font-bold border bg-slate-100 text-slate-500 border-slate-200">
                        No Status
                      </span>
                    )
                  )}
                </div>
                
                <div className="flex flex-wrap gap-4 mt-4 bg-white/50 p-3 rounded-xl border border-indigo-100/50">
                  <div className="flex flex-col gap-1">
                    <span className="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Ref</span>
                    {isEditable ? (
                      <input type="text" value={jobInfoForm.ref} onChange={e => handleInfoChange('ref', e.target.value)} className="px-2 py-1 text-xs border border-slate-200 rounded focus:ring-1 focus:ring-indigo-500 outline-none" placeholder="Enter Ref..." />
                    ) : (
                      <span className="text-xs font-bold text-slate-700">{jobInfoForm.ref || 'N/A'}</span>
                    )}
                  </div>
                  <div className="flex flex-col gap-1">
                    <span className="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Started Date</span>
                    {isEditable ? (
                      <input type="date" value={jobInfoForm.startedDate} onChange={e => handleInfoChange('startedDate', e.target.value)} className="px-2 py-1 text-xs border border-slate-200 rounded focus:ring-1 focus:ring-indigo-500 outline-none" />
                    ) : (
                      <span className="text-xs font-bold text-slate-700">{jobInfoForm.startedDate || '-'}</span>
                    )}
                  </div>
                  <div className="flex flex-col gap-1">
                    <span className="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Owner</span>
                    {isEditable && currentUser.role === 'Manager' ? (
                      <select value={jobInfoForm.ownerId} onChange={e => handleInfoChange('ownerId', e.target.value)} className="px-2 py-1 text-xs border border-slate-200 rounded focus:ring-1 focus:ring-indigo-500 outline-none">
                        <option value="">Unassigned</option>
                        {staffUsers.map(u => <option key={u.id} value={u.id}>{u.name}</option>)}
                      </select>
                    ) : (
                      <span className="text-xs font-bold text-indigo-600">{users.find(u => u.id === jobInfoForm.ownerId)?.name || 'Unassigned'}</span>
                    )}
                  </div>
                </div>
              </div>
              <div className="flex items-center gap-2 shrink-0">
                {isEditable && (
                  <button onClick={() => setShowDeleteConfirm(true)} className="p-2 bg-white hover:bg-red-50 text-red-400 hover:text-red-600 rounded-full transition-colors shadow-sm border border-red-100" title="Delete Job">
                    <Trash2 className="w-5 h-5" />
                  </button>
                )}
                <button onClick={onClose} className="p-2 bg-white hover:bg-rose-50 text-slate-400 hover:text-rose-500 rounded-full transition-colors shadow-sm border border-slate-100">
                  <X className="w-5 h-5" />
                </button>
              </div>
            </div>

            <div className="p-6 overflow-y-auto flex-1 bg-slate-50/50">
              <div className="rounded-xl border border-slate-200 overflow-hidden bg-white shadow-sm">
                <table className="w-full text-sm text-left">
                  <thead className="text-[11px] font-bold text-slate-500 uppercase tracking-wider bg-slate-50 border-b border-slate-200">
                    <tr>
                      <th className="px-5 py-4 w-1/3">Phase</th>
                      <th className="px-5 py-4">Progress</th>
                      <th className="px-5 py-4">Hours Spent</th>
                      <th className="px-5 py-4">Date Sent</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-100">
                    {orderedPhaseNames.map((phaseName, index) => {
                      const data = phasesForm[phaseName];
                      const isEven = index % 2 === 0;
                      const isBasePhase = PHASES.includes(phaseName);
                      return (
                        <tr key={phaseName} className={`hover:bg-indigo-50/30 transition-colors ${isEven ? 'bg-white' : 'bg-slate-50/30'}`}>
                          <td className="px-5 py-4 font-bold text-slate-700">
                            <div className="flex items-center justify-between">
                              <span>{phaseName}</span>
                              {!isBasePhase && isEditable && (
                                <button onClick={() => handleRemovePhase(phaseName)} className="text-red-400 hover:text-red-600 p-1" title="Xóa phase này">
                                  <X className="w-4 h-4" />
                                </button>
                              )}
                            </div>
                          </td>
                          
                          <td className="px-5 py-4">
                            {isEditable ? (
                              <select 
                                value={data.progress}
                                onChange={(e) => handlePhaseChange(phaseName, 'progress', e.target.value)}
                                className={`w-full px-3 py-2 border rounded-lg outline-none text-sm font-bold shadow-sm transition-colors ${getProgressStyles(data.progress, data.progress === 'Completed' && !data.dateSent)}`}
                              >
                                {PROGRESS_STATUSES.map(s => <option key={s} value={s} className="bg-white text-black">{s}</option>)}
                              </select>
                            ) : (
                              <span className={`px-3 py-1.5 rounded-md text-xs font-bold border shadow-sm ${getProgressStyles(data.progress, false)}`}>
                                {data.progress}
                              </span>
                            )}
                          </td>

                          <td className="px-5 py-4">
                            {isEditable ? (
                              <div className="relative">
                                <input 
                                  type="number" min="0" step="0.5"
                                  value={data.hoursSpent}
                                  onChange={(e) => handlePhaseChange(phaseName, 'hoursSpent', parseFloat(e.target.value) || 0)}
                                  className="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-sm font-mono bg-white shadow-sm pr-10"
                                />
                                <span className="absolute right-3 top-2 text-xs font-bold text-slate-400">hrs</span>
                              </div>
                            ) : (
                              <span className="font-mono bg-slate-100 px-2 py-1 rounded text-slate-600 text-xs font-bold border border-slate-200 shadow-sm">{data.hoursSpent} hrs</span>
                            )}
                          </td>

                          <td className="px-5 py-4">
                            {isEditable ? (
                              <input 
                                type="date" 
                                value={data.dateSent}
                                onChange={(e) => handlePhaseChange(phaseName, 'dateSent', e.target.value)}
                                className={`w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-sm shadow-sm font-medium transition-colors
                                  ${data.progress === 'Completed' && !data.dateSent ? 'border-red-400 bg-red-50 ring-1 ring-red-400' : 'border-slate-200 bg-white'}
                                `}
                              />
                            ) : (
                              <span className="text-slate-600 font-medium">{data.dateSent || '-'}</span>
                            )}
                          </td>
                        </tr>
                      )
                    })}
                  </tbody>
                </table>
              </div>
              
              {isEditable && (
                <div className="mt-4 p-4 border border-dashed border-indigo-200 rounded-xl bg-indigo-50/30 flex flex-wrap items-center gap-3">
                  <span className="text-sm font-bold text-slate-600">Add Optional Phase:</span>
                  <select
                    value={selectedOptPhase}
                    onChange={e => setSelectedOptPhase(e.target.value)}
                    className="px-3 py-2 border border-slate-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-500 font-medium"
                  >
                    {OPTIONAL_PHASES.map(op => <option key={op} value={op}>{op}</option>)}
                  </select>
                  <button
                    onClick={handleAddPhase}
                    className="flex items-center gap-1 bg-white border border-indigo-200 text-indigo-600 px-4 py-2 rounded-lg hover:bg-indigo-50 font-bold text-sm transition-colors shadow-sm"
                  >
                    <Plus className="w-4 h-4" /> Add
                  </button>
                </div>
              )}
            </div>

            <div className="px-6 py-5 border-t border-slate-200 bg-white flex justify-between items-end gap-3">
              <div className="flex-1 flex flex-col gap-2">
                <div className="flex items-center gap-4 bg-slate-50 px-4 py-2.5 rounded-lg border border-slate-200 w-max">
                  <span className="text-xs font-bold text-slate-500 uppercase tracking-wider">Pre-Design: <span className="text-indigo-600 text-sm ml-1">{preDesignHrs}</span> <span className="text-[10px] text-slate-400">hrs</span></span>
                  <span className="w-px h-4 bg-slate-300"></span>
                  <span className="text-xs font-bold text-slate-500 uppercase tracking-wider">Total DFM: <span className="text-indigo-600 text-sm ml-1">{totalDfmHrs}</span> <span className="text-[10px] text-slate-400">hrs</span></span>
                  <span className="w-px h-4 bg-slate-300"></span>
                  <span className="text-xs font-bold text-slate-500 uppercase tracking-wider">Updates: <span className="text-indigo-600 text-sm ml-1">{updatesHrs}</span> <span className="text-[10px] text-slate-400">hrs</span></span>
                </div>
                {errorMsg && <p className="text-red-500 text-sm font-bold animate-pulse">{errorMsg}</p>}
              </div>
              <div className="flex gap-3 pb-1">
                <button onClick={onClose} className="px-5 py-2.5 border border-slate-200 rounded-xl hover:bg-slate-50 text-slate-700 font-bold text-sm transition-colors">
                  {isEditable ? 'Cancel' : 'Close'}
                </button>
                {isEditable && (
                  <button 
                    onClick={handleSave} 
                    className="px-6 py-2.5 bg-gradient-to-r from-indigo-600 to-cyan-500 text-white rounded-xl hover:from-indigo-700 hover:to-cyan-600 font-bold text-sm transition-all shadow-md hover:shadow-lg"
                  >
                    Save Changes
                  </button>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
