        return () => unsubscribe();

      }, []);

          const loadedUsers = [];

          let hasAlan = false;

          

          snapshot.forEach(doc => {

            const data = doc.data();

            loadedUsers.push(data);

            if (data.id === 'c1' || data.name === 'Alan Hennis') hasAlan = true;

          });



          if (snapshot.empty) {

            INITIAL_USERS.forEach(u => setDoc(doc(db, 'users', u.id), u));

          } else {

            if (!hasAlan) {

              const alan = { id: 'c1', name: 'Alan Hennis', role: 'Customer' };

              setDoc(doc(db, 'users', 'c1'), alan);

            }

            setUsers(loadedUsers);

          }

        });



        const projectsRef = collection(db, 'projects');

        const unsubProjects = onSnapshot(projectsRef, (snapshot) => {

          const loadedProjects = [];

          snapshot.forEach(doc => loadedProjects.push(doc.data()));

          if (snapshot.empty) INITIAL_PROJECTS.forEach(p => setDoc(doc(db, 'projects', p.id), p));

          else {

            setProjects(loadedProjects);

            setIsDataLoaded(true);

          }

        });



        return () => { unsubUsers(); unsubProjects(); };

    function StatisticsView({ projects }) {

      const statsData = useMemo(() => {

        const stats = {};

        const allMonths = new Set();

        const categories = ['Pre-Design', 'Wall Panels', 'Floor Cassette', 'Roof Panels', 'Lookouts', 'Update', 'Correction', 'Variation'];



        projects.forEach(p => {

          const isVariationJob = p.jobName.toLowerCase().includes('variation');



          Object.entries(p.phases || {}).forEach(([phaseName, phaseData]) => {

            if (phaseData.dateSent) { // Đếm khi đã có Date Sent

              const month = phaseData.dateSent.substring(0, 7); // Lấy YYYY-MM

              allMonths.add(month);



              if (!stats[month]) {

                stats[month] = {};

                categories.forEach(c => stats[month][c] = 0);

              }



              let category = null;

              if (isVariationJob) {

                category = 'Variation';

              } else {

                const pName = phaseName.toLowerCase();

                if (pName.includes('correction')) category = 'Correction';

                else if (pName.includes('update')) category = 'Update';

                else if (pName.includes('pre-design')) category = 'Pre-Design';

                else if (pName.includes('wall panels')) category = 'Wall Panels';

                else if (pName.includes('floor cassette')) category = 'Floor Cassette';

                else if (pName.includes('roof panels')) category = 'Roof Panels';

                else if (pName.includes('lookouts')) category = 'Lookouts';

              }



              if (category) {

                stats[month][category]++;

              }

            }

          });

        });



        const sortedMonths = Array.from(allMonths).sort();

        return { stats, sortedMonths, categories };

      }, [projects]);



      const { stats, sortedMonths, categories } = statsData;



      const formatMonth = (monthString) => {

        if (!monthString) return '';

        const parts = monthString.split('-');

        if(parts.length === 2) {

            return `${parts[1]}/${parts[0]}`;

        }

        return monthString;

      };



      return (

        <div className="bg-white p-8 rounded-2xl shadow-sm border border-slate-200 max-w-5xl mx-auto">

          <h3 className="text-lg font-extrabold text-slate-800 mb-6 flex items-center gap-2 border-b pb-4">

            <BarChart2 className="w-5 h-5 text-indigo-500" />

            Thống kê Task hoàn thành

          </h3>

          

          {sortedMonths.length === 0 ? (

             <p className="text-slate-500 text-center py-8">Chưa có dữ liệu task hoàn thành (cần nhập Date Sent).</p>

          ) : (

            <div className="overflow-x-auto">

              <table className="w-full text-sm text-left border border-slate-200 rounded-lg overflow-hidden">

                <thead className="text-[11px] text-slate-500 uppercase tracking-wider bg-slate-50 border-b border-slate-200 font-bold">

                  <tr>

                    <th className="px-5 py-4 border-r border-slate-200 bg-white sticky left-0 z-10 w-48">Loại Task</th>

                    {sortedMonths.map(m => (

                      <th key={m} className="px-5 py-4 text-center border-r border-slate-200">{formatMonth(m)}</th>

                    ))}

                    <th className="px-5 py-4 text-center text-indigo-700 bg-indigo-50/80">Tổng cộng</th>

                  </tr>

                </thead>

                <tbody className="divide-y divide-slate-100">

                  {categories.map(cat => {

                    let rowTotal = 0;

                    return (

                      <tr key={cat} className="hover:bg-slate-50 transition-colors">

                        <td className="px-5 py-3 font-bold text-slate-700 border-r border-slate-200 bg-white sticky left-0 z-10">{cat}</td>

                        {sortedMonths.map(m => {

                          const val = stats[m][cat];

                          rowTotal += val;

                          return (

                            <td key={m} className="px-5 py-3 text-center border-r border-slate-200 text-slate-600 font-medium">

                              {val || '-'}

                            </td>

                          );

                        })}

                        <td className="px-5 py-3 text-center font-bold text-indigo-700 bg-indigo-50/30">

                          {rowTotal || '-'}

                        </td>

                      </tr>

                    );

                  })}

                  

                  {/* Dòng Tổng cộng các tháng */}

                  <tr className="bg-slate-100 font-extrabold text-slate-800 border-t-2 border-slate-200">

                    <td className="px-5 py-4 border-r border-slate-200 bg-slate-100 sticky left-0 z-10">TỔNG THÁNG</td>

                    {sortedMonths.map(m => {

                      const colTotal = categories.reduce((sum, cat) => sum + stats[m][cat], 0);

                      return (

                        <td key={m} className="px-5 py-4 text-center border-r border-slate-200 text-indigo-700">

                          {colTotal || '-'}

                        </td>

                      );

                    })}

                    <td className="px-5 py-4 text-center text-indigo-800 bg-indigo-100">

                      {categories.reduce((sum, cat) => sum + sortedMonths.reduce((s, m) => s + stats[m][cat], 0), 0) || '-'}

                    </td>

                  </tr>

                </tbody>

              </table>

            </div>

          )}

        </div>

      );

    function JobsTable({ projects, users, onJobClick }) {

      const [sortConfig, setSortConfig] = useState({ key: 'receivedDate', direction: 'asc' });

      const [filters, setFilters] = useState({ priority: '', status: '', ownerId: '', buildingType: '' });



      const sortedProjects = useMemo(() => {

        let filteredItems = projects.filter(p => {

          if (filters.priority && extractPriority(p) !== filters.priority) return false;

          

          if (filters.status) {

            const arr = extractStatuses(p);

            if (!arr.includes(filters.status)) return false;

          }

          if (filters.ownerId && p.ownerId !== filters.ownerId) return false;

          if (filters.buildingType && p.buildingType !== filters.buildingType) return false;

          return true;

        });



        let sortableItems = [...filteredItems];

        if (sortConfig.key !== null) {

          sortableItems.sort((a, b) => {

            let aValue = a[sortConfig.key];

            let bValue = b[sortConfig.key];



            if (sortConfig.key === 'ownerId') {

              aValue = users.find(u => u.id === aValue)?.name || '';

              bValue = users.find(u => u.id === bValue)?.name || '';

            }



            if (sortConfig.key === 'priority') {

              const pWeights = { 'High': 3, 'Medium': 2, 'Low': 1, 'None': 0 };

              aValue = pWeights[extractPriority(a)] || 0;

              bValue = pWeights[extractPriority(b)] || 0;

            }



            if (sortConfig.key === 'status') {

              const statusWeights = { 'In Process': 7, 'Checking': 4, 'Awaiting Further Info': 3, 'On Hold': 2, 'Completed': 1 };

              const getWeight = (st) => {

                  const arr = extractStatuses(st);

                  if (arr.length === 0) return 0;

                  return Math.max(...arr.map(s => statusWeights[s] || 0));

              };

              aValue = getWeight(aValue);

              bValue = getWeight(bValue);

            }



            aValue = aValue || '';

            bValue = bValue || '';



            if (aValue < bValue) return sortConfig.direction === 'asc' ? -1 : 1;

            if (aValue > bValue) return sortConfig.direction === 'asc' ? 1 : -1;

            return 0;

          });

        }

        return sortableItems;

      }, [projects, sortConfig, filters, users]);



      const requestSort = (key) => {

        let direction = 'asc';

        if (sortConfig.key === key && sortConfig.direction === 'asc') {

          direction = 'desc';

        }

        setSortConfig({ key, direction });

      };



      const getSortIcon = (columnName) => {

        if (sortConfig.key !== columnName) {

          return <ArrowUpDown className="w-3 h-3 text-slate-300 group-hover:text-slate-400" />;

        }

        return sortConfig.direction === 'asc' 

          ? <ChevronUp className="w-3 h-3 text-indigo-600" /> 

          : <ChevronDown className="w-3 h-3 text-indigo-600" />;

      };



      const staffUsers = users.filter(u => u.role === 'Staff');

      const getUserColor = (userId) => {

        if (!userId) return 'text-slate-400';

        const idx = staffUsers.findIndex(u => u.id === userId);

        return OWNER_COLORS[Math.max(0, idx) % OWNER_COLORS.length];

      };



      return (

        <div className="overflow-x-auto rounded-xl border border-slate-200 bg-white shadow-sm">

          <table className="w-full text-sm text-left whitespace-nowrap">

            <thead className="text-[11px] text-slate-500 uppercase tracking-wider bg-slate-50/80 border-b border-slate-200 font-bold">

              <tr>

                {[

                  { label: 'Job Name', key: 'jobName' },

                  { label: 'Priority', key: 'priority', filterable: true, options: PRIORITIES.map(s => ({ value: s, label: s })) },

                  { label: 'Status', key: 'status', filterable: true, options: STATUSES.map(s => ({ value: s, label: s })) },

                  { label: 'Ref', key: 'ref' },

                  { label: 'Received Date', key: 'receivedDate' },

                  { label: 'Due Date', key: 'dueDate' },

                  { label: 'Owner', key: 'ownerId', filterable: true, options: staffUsers.map(u => ({ value: u.id, label: u.name })) },

                  { label: 'Building Type', key: 'buildingType', filterable: true, options: BUILDING_TYPES.map(t => ({ value: t, label: t })) },

                ].map(col => (

                  <th 

                    key={col.key}

                    className="px-5 py-3 align-top group"

                  >

                    <div 

                      className="flex items-center gap-1.5 cursor-pointer hover:text-indigo-600 transition-colors"

                      onClick={() => requestSort(col.key)}

                    >

                      {col.label}

                      {getSortIcon(col.key)}

                    </div>

                    {col.filterable && (

                      <div className="mt-2 font-medium" onClick={e => e.stopPropagation()}>

                        <select

                          value={filters[col.key]}

                          onChange={(e) => setFilters(prev => ({ ...prev, [col.key]: e.target.value }))}

                          className="w-full min-w-[90px] px-2 py-1.5 border border-slate-200 rounded-lg text-[10px] text-slate-700 outline-none focus:ring-2 focus:ring-indigo-500 bg-white"

                        >

                          <option value="">All</option>

                          {col.options.map(opt => (

                            <option key={opt.value} value={opt.value}>{opt.label}</option>

                          ))}

                        </select>

                      </div>

                    )}

                  </th>

                ))}

              </tr>

            </thead>

            <tbody className="divide-y divide-slate-100">

              {sortedProjects.length === 0 ? (

                <tr>

                  <td colSpan="9" className="px-5 py-12 text-center text-slate-400 bg-white">

                    <div className="flex flex-col items-center justify-center">

                      <FileText className="w-10 h-10 text-slate-200 mb-2" />

                      <p>No jobs found.</p>

                    </div>

                  </td>

                </tr>

              ) : sortedProjects.map(p => {

                const owner = users.find(u => u.id === p.ownerId)?.name || 'Unassigned';

                const ownerColorClass = getUserColor(p.ownerId);

                const pPriority = extractPriority(p);

                const pStatuses = extractStatuses(p);



                return (

                  <tr 

                    key={p.id} 

                    onClick={() => onJobClick(p)}

                    className="hover:bg-indigo-50/50 cursor-pointer transition-colors bg-white group"

                    title="Click to view/edit phases"

                  >

                    <td className="px-5 py-3.5 font-bold text-indigo-700 group-hover:text-indigo-800">{p.jobName}</td>

                    

                    {/* Render Priority Icon */}

                    <td className="px-5 py-3.5 text-center">

                      {pPriority === 'High' && <PriorityHigh className="w-6 h-6 inline-block" title="High Priority" />}

                      {pPriority === 'Medium' && <PriorityMedium className="w-6 h-6 inline-block" title="Medium Priority" />}

                      {pPriority === 'Low' && <PriorityLow className="w-6 h-6 inline-block" title="Low Priority" />}

                      {pPriority === 'None' && <span className="text-slate-300 font-bold">-</span>}

                    </td>



                    <td className="px-5 py-3.5">

                      {(() => {

                          if (pStatuses.length === 0) return <span className="text-slate-400 text-xs font-semibold">-</span>;

                          const normalStatuses = pStatuses.filter(st => st !== 'Awaiting Further Info');

                          const hasAwaiting = pStatuses.includes('Awaiting Further Info');

                          

                          return (

                            <div className="flex flex-col gap-1 items-start">

                              {normalStatuses.length > 0 && (

                                <div className="flex gap-1">

                                  {normalStatuses.map(st => (

                                    <span key={st} className={`whitespace-nowrap px-2.5 py-1 rounded-md text-[10px] uppercase tracking-wider font-bold border ${STATUS_STYLES[st] || 'bg-white border-slate-200'}`}>

                                      {st}

                                    </span>

                                  ))}

                                </div>

                              )}

                              {hasAwaiting && (

                                <span className={`whitespace-nowrap px-2.5 py-1 rounded-md text-[10px] uppercase tracking-wider font-bold border ${STATUS_STYLES['Awaiting Further Info']}`}>

                                  Awaiting Further Info

                                </span>

                              )}

                            </div>

                          );

                      })()}

                    </td>

                    <td className="px-5 py-3.5 text-slate-800 font-mono text-xs font-bold">{p.ref || '-'}</td>

                    <td className="px-5 py-3.5 text-slate-800 font-bold">{formatDate(p.receivedDate) || '-'}</td>

                    <td className="px-5 py-3.5 text-slate-800 font-bold">{formatDate(p.dueDate) || '-'}</td>

                    <td className={`px-5 py-3.5 font-extrabold ${ownerColorClass}`}>

                      <span className="bg-slate-50 px-2.5 py-1 rounded-md border border-slate-100 shadow-sm">{owner}</span>

                    </td>

                    <td className="px-5 py-3.5">

                      {p.buildingType ? (

                        <span className="px-2.5 py-1 rounded-md text-xs font-bold bg-slate-200 text-slate-800 border border-slate-300">

                          {p.buildingType}

                        </span>

                      ) : '-'}

                    </td>

                  </tr>

                )

              })}

            </tbody>

          </table>

        </div>

      );

    }



    function JobProgressModal({ job, currentUser, users, onClose, onSave, onDelete }) {

      const [phasesForm, setPhasesForm] = useState({ ...job.phases });

      const [jobInfoForm, setJobInfoForm] = useState({

        jobName: job.jobName || '',

        status: extractStatuses(job),

        priority: extractPriority(job),

        ref: job.ref || '',

        ownerId: job.ownerId || '',

        startedDate: job.startedDate || ''

      });

      const [optAction, setOptAction] = useState('');

      const [optTarget, setOptTarget] = useState('');

      const OPT_ACTIONS = ['Update', 'Correction'];

      const OPT_TARGETS = ['Pre-Design', 'Wall Panels', 'Floor Cassette', 'Roof Panels', 'Lookouts'];

      

      const [errorMsg, setErrorMsg] = useState('');

      const [showDeleteConfirm, setShowDeleteConfirm] = useState(false);

      const [showStatusDropdown, setShowStatusDropdown] = useState(false);

      const [showPriorityDropdown, setShowPriorityDropdown] = useState(false);

      

      const isEditable = currentUser.role !== 'Customer' && (currentUser.role === 'Manager' || job.ownerId === currentUser.id);



      useEffect(() => {

        const phases = Object.values(phasesForm);

        if (phases.length === 0) return;

        

        const allCompleted = phases.every(p => p.progress === 'Completed');

        if (allCompleted && !jobInfoForm.status.includes('Completed')) {

          setJobInfoForm(prev => ({ ...prev, status: ['Completed'] }));

        } else if (!allCompleted && jobInfoForm.status.includes('Completed') && jobInfoForm.status.length === 1) {

          setJobInfoForm(prev => ({ ...prev, status: [] }));

        }

      }, [phasesForm]);



      const getProgressStyles = (progress, hasError) => {

        if (hasError) return 'bg-red-50 border-red-400 text-red-900 ring-2 ring-red-400';

        switch (progress) {

          case 'Not Started': return 'bg-gray-200 text-black border-gray-300';

          case 'In Progress': return 'bg-blue-300 text-black border-blue-400';

          case 'Checking': return 'bg-orange-400 text-black border-orange-500';

          case 'On Hold': return 'bg-red-600 text-white border-red-700';

          case 'Completed': return 'bg-emerald-600 text-white border-emerald-700';

          default: return 'bg-white border-slate-200 text-slate-700';

        }

      };



      const handlePhaseChange = (phaseName, field, value) => {

        setPhasesForm(prev => ({

          ...prev,

          [phaseName]: {

            ...prev[phaseName],

            [field]: value

          }

        }));

        if (errorMsg) setErrorMsg('');

      };



      const handleInfoChange = (field, value) => {

        setJobInfoForm(prev => ({ ...prev, [field]: value }));

      };



      const handleAddPhase = () => {

        if (!optAction || !optTarget) return;

        let baseName = `${optAction} ${optTarget}`;

        let finalName = baseName;

        let count = 1;

        while(phasesForm[finalName]) {

            count++;

            finalName = `${baseName} (${count})`;

        }

        setPhasesForm(prev => ({

            ...prev,

            [finalName]: { progress: 'Not Started', hoursSpent: 0, dateSent: '' }

        }));

        setOptAction('');

        setOptTarget('');

      };



      const handleRemovePhase = (phaseName) => {

        const newPhases = { ...phasesForm };

        delete newPhases[phaseName];

        setPhasesForm(newPhases);

      };



      const handleSave = () => {

        for (const [phaseName, data] of Object.entries(phasesForm)) {

          if (data.progress === 'Completed' && !data.dateSent) {

            setErrorMsg(`Vui lòng nhập Date Sent cho phase "${phaseName}" khi đã chọn Completed.`);

            return;

          }

        }

        setErrorMsg('');

        onSave(job.id, { phases: phasesForm, ...jobInfoForm });

      };

      

      const currentStatuses = Array.isArray(jobInfoForm.status) ? jobInfoForm.status : [];

      const staffUsers = users.filter(u => u.role === 'Staff');



      const preDesignHrs = parseFloat(phasesForm['Pre-Design']?.hoursSpent || 0);

      const totalDfmHrs = ['DFM - Wall Panels', 'DFM - Floor Cassette', 'DFM - Roof Panels', 'DFM - Lookouts']

        .reduce((sum, phase) => sum + parseFloat(phasesForm[phase]?.hoursSpent || 0), 0);

      const updatesHrs = Object.keys(phasesForm)

        .filter(phase => !PHASES.includes(phase))

        .reduce((sum, phase) => sum + parseFloat(phasesForm[phase]?.hoursSpent || 0), 0);



      // Cố định thứ tự hiển thị của các Phase

      const orderedPhaseNames = useMemo(() => {

        const keys = Object.keys(phasesForm);

        const basePhases = PHASES.filter(p => keys.includes(p));

        

        const optionalPhases = keys.filter(p => !PHASES.includes(p)).sort((a, b) => {

          const getBaseAndNum = (name) => {

            const match = name.match(/^(.*?)(?:\s\((\d+)\))?$/);

            return { base: match ? match[1] : name, num: match && match[2] ? parseInt(match[2], 10) : 1 };

          };

          const aParsed = getBaseAndNum(a);

          const bParsed = getBaseAndNum(b);



          if (aParsed.base === bParsed.base) return aParsed.num - bParsed.num;

          return aParsed.base.localeCompare(bParsed.base);

        });



        return [...basePhases, ...optionalPhases];

      }, [phasesForm]);



      return (

        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">

          <div className="bg-white rounded-2xl shadow-[0_20px_50px_rgba(8,_112,_184,_0.15)] w-full max-w-4xl overflow-hidden flex flex-col max-h-[90vh] border border-white relative">

            

            {showDeleteConfirm && (

              <div className="absolute inset-0 bg-white/90 backdrop-blur-sm z-50 flex items-center justify-center">

                <div className="bg-white p-6 rounded-2xl shadow-xl border border-red-100 text-center max-w-sm">

                  <div className="w-12 h-12 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4">

                    <Trash2 className="w-6 h-6" />

                  </div>

                  <h3 className="text-lg font-bold text-slate-800 mb-2">Delete this job?</h3>

                  <p className="text-sm text-slate-500 mb-6">This action cannot be undone. All progress and logged hours will be lost.</p>

                  <div className="flex gap-3 justify-center">

                    <button onClick={() => setShowDeleteConfirm(false)} className="px-4 py-2 border border-slate-200 rounded-xl hover:bg-slate-50 font-bold text-sm transition-colors text-slate-700">Cancel</button>

                    <button onClick={() => onDelete(job.id)} className="px-4 py-2 bg-red-600 text-white rounded-xl hover:bg-red-700 font-bold text-sm shadow-md transition-all">Yes, Delete</button>

                  </div>

                </div>

              </div>

            )}



            <div className="px-6 py-5 border-b flex justify-between items-start bg-gradient-to-r from-indigo-50 to-white">

              <div className="flex-1 pr-4">

                <div className="flex items-center gap-3">

                  {/* Biểu tượng Priority kèm Menu thả xuống */}

                  <div className="relative">

                    <button 

                      onClick={() => isEditable && setShowPriorityDropdown(!showPriorityDropdown)} 

                      className={`flex items-center justify-center transition-transform outline-none ${isEditable ? 'cursor-pointer hover:scale-110' : 'cursor-default'}`}

                      title={isEditable ? "Click to change Priority" : "Priority"}

                    >

                      {jobInfoForm.priority === 'High' && <PriorityHigh className="w-8 h-8 drop-shadow-sm" />}

                      {jobInfoForm.priority === 'Medium' && <PriorityMedium className="w-8 h-8 drop-shadow-sm" />}

                      {jobInfoForm.priority === 'Low' && <PriorityLow className="w-8 h-8 drop-shadow-sm" />}

                      {(jobInfoForm.priority === 'None' || !jobInfoForm.priority) && <div className="w-7 h-7 rounded-full border-2 border-dashed border-slate-300 flex items-center justify-center text-slate-300 text-xs font-bold bg-white">-</div>}

                    </button>



                    {showPriorityDropdown && isEditable && (

                      <div className="absolute top-full left-0 mt-2 w-40 bg-white border border-slate-200 shadow-xl rounded-xl z-50 p-2 flex flex-col gap-1">

                        {PRIORITIES.map(p => (

                          <button

                            key={p}

                            onClick={() => { handleInfoChange('priority', p); setShowPriorityDropdown(false); }}

                            className="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-slate-50 transition-colors text-left text-sm font-semibold text-slate-700"

                          >

                            {p === 'High' && <PriorityHigh className="w-5 h-5" />}

                            {p === 'Medium' && <PriorityMedium className="w-5 h-5" />}

                            {p === 'Low' && <PriorityLow className="w-5 h-5" />}

                            {p === 'None' && <span className="w-5 h-5 flex items-center justify-center text-slate-400 font-bold">-</span>}

                            <span>{p}</span>

                          </button>

                        ))}

                      </div>

                    )}

                  </div>



                  {isEditable ? (

                    <input 

                      type="text" 

                      value={jobInfoForm.jobName} 

                      onChange={e => handleInfoChange('jobName', e.target.value)} 

                      className="text-2xl font-extrabold text-indigo-900 bg-transparent border border-transparent hover:border-slate-300 focus:border-indigo-500 focus:bg-white rounded-lg px-2 py-0.5 outline-none transition-all w-full max-w-[300px]"

                      placeholder="Enter Job Name..."

                    />

                  ) : (

                    <h2 className="text-2xl font-extrabold text-indigo-900 px-2 py-0.5">{jobInfoForm.jobName}</h2>

                  )}



                  <div className="relative flex items-center gap-2">

                    {(() => {

                        if (currentStatuses.length === 0) return (

                            <span className="whitespace-nowrap px-2.5 py-1 rounded-md text-[10px] uppercase tracking-wider font-bold border bg-slate-100 text-slate-500 border-slate-200">

                               No Status

                            </span>

                        );

                        const normalStatuses = currentStatuses.filter(st => st !== 'Awaiting Further Info');

                        const hasAwaiting = currentStatuses.includes('Awaiting Further Info');

                        

                        return (

                          <div className="flex flex-col gap-1 items-start">

                            {normalStatuses.length > 0 && (

                              <div className="flex gap-1">

                                {normalStatuses.map(st => (

                                  <span key={st} className={`whitespace-nowrap px-2.5 py-1 rounded-md text-[10px] uppercase tracking-wider font-bold border ${STATUS_STYLES[st] || 'bg-white border-slate-200'}`}>

                                    {st}

                                  </span>

                                ))}

                              </div>

                            )}

                            {hasAwaiting && (

                              <span className={`whitespace-nowrap px-2.5 py-1 rounded-md text-[10px] uppercase tracking-wider font-bold border ${STATUS_STYLES['Awaiting Further Info']}`}>

                                Awaiting Further Info

                              </span>

                            )}

                          </div>

                        );

                    })()}

                    {isEditable && (

                        <div className="relative">

                            <button onClick={() => setShowStatusDropdown(!showStatusDropdown)} className="p-1.5 hover:bg-slate-200 rounded-lg text-slate-500 transition-colors bg-slate-100 border border-slate-200 shadow-sm" title="Edit Status">

                                <Pencil className="w-4 h-4" />

                            </button>

                            {showStatusDropdown && (

                                <div className="absolute top-full left-0 mt-2 w-56 bg-white border border-slate-200 shadow-xl rounded-xl z-50 p-3 flex flex-col gap-2">

                                    <div className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1 flex justify-between">

                                      <span>Select Status</span>

                                      <span>{currentStatuses.length}/3</span>

                                    </div>

                                    {STATUSES.map(st => {

                                        const isSel = currentStatuses.includes(st);

                                        const isDis = !isSel && currentStatuses.length >= 3;

                                        return (

                                            <label key={st} className={`flex items-center gap-3 px-2 py-1.5 rounded-lg hover:bg-slate-50 text-sm font-semibold transition-colors ${isDis ? 'opacity-50 cursor-not-allowed' : 'cursor-pointer'}`}>

                                                <input 

                                                  type="checkbox" 

                                                  checked={isSel} 

                                                  disabled={isDis} 

                                                  onChange={() => {

                                                      if (isSel) handleInfoChange('status', currentStatuses.filter(s => s !== st));

                                                      else if (!isDis) handleInfoChange('status', [...currentStatuses, st]);

                                                  }} 

                                                  className="rounded text-indigo-600 focus:ring-indigo-500 w-4 h-4" 

                                                />

                                                <span className={`px-2 py-0.5 rounded text-[10px] border ${STATUS_STYLES[st] || 'border-slate-200'}`}>{st}</span>

                                            </label>

                                        )

                                    })}

                                </div>

                            )}

                        </div>

                    )}

                  </div>

                </div>

                

                <div className="flex flex-wrap gap-4 mt-4 bg-white/50 p-3 rounded-xl border border-indigo-100/50">

                  <div className="flex flex-col gap-1">

                    <span className="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Ref</span>

                    {isEditable ? (

                      <input type="text" value={jobInfoForm.ref} onChange={e => handleInfoChange('ref', e.target.value)} className="px-2 py-1 text-xs border border-slate-200 rounded focus:ring-1 focus:ring-indigo-500 outline-none" placeholder="Enter Ref..." />

                    ) : (

                      <span className="text-xs font-bold text-slate-700">{jobInfoForm.ref || 'N/A'}</span>

                    )}

                  </div>

                  <div className="flex flex-col gap-1">

                    <span className="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Started Date</span>

                    {isEditable ? (

                      <input type="date" value={jobInfoForm.startedDate} onChange={e => handleInfoChange('startedDate', e.target.value)} className="px-2 py-1 text-xs border border-slate-200 rounded focus:ring-1 focus:ring-indigo-500 outline-none" />

                    ) : (

                      <span className="text-xs font-bold text-slate-700">{formatDate(jobInfoForm.startedDate) || '-'}</span>

                    )}

                  </div>

                  <div className="flex flex-col gap-1">

                    <span className="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Owner</span>

                    {isEditable && currentUser.role === 'Manager' ? (

                      <select value={jobInfoForm.ownerId} onChange={e => handleInfoChange('ownerId', e.target.value)} className="px-2 py-1 text-xs border border-slate-200 rounded focus:ring-1 focus:ring-indigo-500 outline-none">

                        <option value="">Unassigned</option>

                        {staffUsers.map(u => <option key={u.id} value={u.id}>{u.name}</option>)}

                      </select>

                    ) : (

                      <span className="text-xs font-bold text-indigo-600">{users.find(u => u.id === jobInfoForm.ownerId)?.name || 'Unassigned'}</span>

                    )}

                  </div>

                </div>

              </div>

              <div className="flex items-center gap-2 shrink-0">

                {isEditable && (

                  <button onClick={() => setShowDeleteConfirm(true)} className="p-2 bg-white hover:bg-red-50 text-red-400 hover:text-red-600 rounded-full transition-colors shadow-sm border border-red-100" title="Delete Job">

                    <Trash2 className="w-5 h-5" />

                  </button>

                )}

                <button onClick={onClose} className="p-2 bg-white hover:bg-rose-50 text-slate-400 hover:text-rose-500 rounded-full transition-colors shadow-sm border border-slate-100">

                  <X className="w-5 h-5" />

                </button>

              </div>

            </div>



            <div className="p-6 overflow-y-auto flex-1 bg-slate-50/50">

              <div className="rounded-xl border border-slate-200 overflow-hidden bg-white shadow-sm">

                <table className="w-full text-sm text-left">

                  <thead className="text-[11px] font-bold text-slate-500 uppercase tracking-wider bg-slate-50 border-b border-slate-200">

                    <tr>

                      <th className="px-5 py-4 w-1/3">Phase</th>

                      <th className="px-5 py-4">Progress</th>

                      <th className="px-5 py-4">Hours Spent</th>

                      <th className="px-5 py-4">Date Sent</th>

                    </tr>

                  </thead>

                  <tbody className="divide-y divide-slate-100">

                    {orderedPhaseNames.map((phaseName, index) => {

                      const data = phasesForm[phaseName];

                      const isEven = index % 2 === 0;

                      const isBasePhase = PHASES.includes(phaseName);

                      return (

                        <tr key={phaseName} className={`hover:bg-indigo-50/30 transition-colors ${isEven ? 'bg-white' : 'bg-slate-50/30'}`}>

                          <td className="px-5 py-4 font-bold text-slate-700">

                            <div className="flex items-center justify-between">

                              <span>{phaseName}</span>

                              {!isBasePhase && isEditable && (

                                <button onClick={() => handleRemovePhase(phaseName)} className="text-red-400 hover:text-red-600 p-1" title="Xóa phase này">

                                  <X className="w-4 h-4" />

                                </button>

                              )}

                            </div>

                          </td>

                          

                          <td className="px-5 py-4">

                            {isEditable ? (

                              <select 

                                value={data.progress}

                                onChange={(e) => handlePhaseChange(phaseName, 'progress', e.target.value)}

                                className={`w-full px-3 py-2 border rounded-lg outline-none text-sm font-bold shadow-sm transition-colors ${getProgressStyles(data.progress, data.progress === 'Completed' && !data.dateSent)}`}

                              >

                                {PROGRESS_STATUSES.map(s => <option key={s} value={s} className="bg-white text-black">{s}</option>)}

                              </select>

                            ) : (

                              <span className={`px-3 py-1.5 rounded-md text-xs font-bold border shadow-sm ${getProgressStyles(data.progress, false)}`}>

                                {data.progress}

                              </span>

                            )}

                          </td>



                          <td className="px-5 py-4">

                            {isEditable ? (

                              <div className="relative">

                                <input 

                                  type="number" min="0" step="0.5"

                                  value={data.hoursSpent}

                                  onChange={(e) => handlePhaseChange(phaseName, 'hoursSpent', parseFloat(e.target.value) || 0)}

                                  className="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-sm font-mono bg-white shadow-sm pr-10"

                                />

                                <span className="absolute right-3 top-2 text-xs font-bold text-slate-400">hrs</span>

                              </div>

                            ) : (

                              <span className="font-mono bg-slate-100 px-2 py-1 rounded text-slate-600 text-xs font-bold border border-slate-200 shadow-sm">{data.hoursSpent} hrs</span>

                            )}

                          </td>



                          <td className="px-5 py-4">

                            {isEditable ? (

                              <input 

                                type="date" 

                                value={data.dateSent}

                                onChange={(e) => handlePhaseChange(phaseName, 'dateSent', e.target.value)}

                                className={`w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-sm shadow-sm font-medium transition-colors

                                  ${data.progress === 'Completed' && !data.dateSent ? 'border-red-400 bg-red-50 ring-1 ring-red-400' : 'border-slate-200 bg-white'}

                                `}

                              />

                            ) : (

                              <span className="text-slate-600 font-medium">{formatDate(data.dateSent) || '-'}</span>

                            )}

                          </td>

                        </tr>

                      )

                    })}

                  </tbody>

                </table>

              </div>

              

              {isEditable && (

                <div className="mt-4 p-4 border border-dashed border-indigo-200 rounded-xl bg-indigo-50/30 flex flex-wrap items-center gap-3">

                  <span className="text-sm font-bold text-slate-600">Add Optional Phase:</span>

                  <select

                    value={optAction}

                    onChange={e => setOptAction(e.target.value)}

                    className="px-3 py-2 border border-slate-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-500 font-medium bg-white"

                  >

                    <option value="">-- Action --</option>

                    {OPT_ACTIONS.map(op => <option key={op} value={op}>{op}</option>)}

                  </select>

                  <select

                    value={optTarget}

                    onChange={e => setOptTarget(e.target.value)}

                    className="px-3 py-2 border border-slate-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-500 font-medium bg-white"

                  >

                    <option value="">-- Phase --</option>

                    {OPT_TARGETS.map(op => <option key={op} value={op}>{op}</option>)}

                  </select>

                  <button

                    onClick={handleAddPhase}

                    disabled={!optAction || !optTarget}

                    className={`flex items-center gap-1 border px-4 py-2 rounded-lg font-bold text-sm transition-colors shadow-sm ${(!optAction || !optTarget) ? 'bg-slate-100 border-slate-200 text-slate-400 cursor-not-allowed' : 'bg-white border-indigo-200 text-indigo-600 hover:bg-indigo-50'}`}

                  >

                    <Plus className="w-4 h-4" /> Add

                  </button>

                </div>

              )}

            </div>



            <div className="px-6 py-5 border-t border-slate-200 bg-white flex justify-between items-end gap-3">

              <div className="flex-1 flex flex-col gap-2">

                <div className="flex items-center gap-4 bg-slate-50 px-4 py-2.5 rounded-lg border border-slate-200 w-max">

                  <span className="text-xs font-bold text-slate-500 uppercase tracking-wider">Pre-Design: <span className="text-indigo-600 text-sm ml-1">{preDesignHrs}</span> <span className="text-[10px] text-slate-400">hrs</span></span>

                  <span className="w-px h-4 bg-slate-300"></span>

                  <span className="text-xs font-bold text-slate-500 uppercase tracking-wider">Total DFM: <span className="text-indigo-600 text-sm ml-1">{totalDfmHrs}</span> <span className="text-[10px] text-slate-400">hrs</span></span>

                  <span className="w-px h-4 bg-slate-300"></span>

                  <span className="text-xs font-bold text-slate-500 uppercase tracking-wider">Updates: <span className="text-indigo-600 text-sm ml-1">{updatesHrs}</span> <span className="text-[10px] text-slate-400">hrs</span></span>

                </div>

                {errorMsg && <p className="text-red-500 text-sm font-bold animate-pulse">{errorMsg}</p>}

              </div>

              <div className="flex gap-3 pb-1">

                <button onClick={onClose} className="px-5 py-2.5 border border-slate-200 rounded-xl hover:bg-slate-50 text-slate-700 font-bold text-sm transition-colors">

                  {isEditable ? 'Cancel' : 'Close'}

                </button>

                {isEditable && (

                  <button 

                    onClick={handleSave} 

                    className="px-6 py-2.5 bg-gradient-to-r from-indigo-600 to-cyan-500 text-white rounded-xl hover:from-indigo-700 hover:to-cyan-600 font-bold text-sm transition-all shadow-md hover:shadow-lg"

                  >

                    Save Changes

                  </button>

                )}

              </div>

            </div>

          </div>

        </div>

      );

    }



    const root = ReactDOM.createRoot(document.getElementById('root'));

    root.render(<App />);

  </script>

</body>

</html>
